<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>InsightAI | Review Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* Background */
body {
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* Navbar (Centered Logo Only) */
.navbar {
    padding: 20px;
    text-align: center;
    color: white;
}

.logo {
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: 1px;
}

/* Container */
.container {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    margin: auto;
    margin-top: 40px;
    padding: 40px;
    border-radius: 20px;
    width: 90%;
    max-width: 800px;
    color: white;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

/* Title */
h1 {
    text-align: center;
    margin-bottom: 10px;
}

.subtitle {
    text-align: center;
    margin-bottom: 30px;
    opacity: 0.85;
}

/* Textarea */
textarea {
    width: 100%;
    height: 150px;
    padding: 15px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 14px;
    resize: none;
}

/* Button */
button {
    margin-top: 20px;
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 10px;
    background: #ffd369;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ffb703;
}

/* Result */
.result {
    margin-top: 30px;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    display: none;
    font-size: 1.2rem;
    font-weight: 600;
}

.positive { background: #2ecc71; }
.negative { background: #e74c3c; }
.neutral { background: #f39c12; }

/* Footer */
.footer {
    text-align: center;
    padding: 15px;
    color: white;
    margin-top: auto;
    opacity: 0.7;
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">InsightAI</div>
</div>

<!-- Main -->
<div class="container">
    <h1>AI Review Analyzer</h1>
    <p class="subtitle">Analyze customer sentiment instantly</p>

    <textarea id="text" placeholder="Enter your review..."></textarea>
    <button onclick="analyze()">Analyze Sentiment</button>

    <div id="result" class="result"></div>
</div>


<script>
function analyze() {
    const text = document.getElementById("text").value.toLowerCase();
    const resultDiv = document.getElementById("result");

    const positiveWords = ["good","great","excellent","amazing","love","awesome"];
    const negativeWords = ["bad","worst","poor","hate","awful","terrible"];

    let pos = 0, neg = 0;

    positiveWords.forEach(w => {
        if (text.includes(w)) pos++;
    });

    negativeWords.forEach(w => {
        if (text.includes(w)) neg++;
    });

    let sentiment = "Neutral 😐";
    let className = "neutral";

    if (pos > neg) {
        sentiment = "Positive 😊";
        className = "positive";
    } else if (neg > pos) {
        sentiment = "Negative 😞";
        className = "negative";
    }

    resultDiv.style.display = "block";
    resultDiv.className = "result " + className;
    resultDiv.innerHTML = sentiment;
}
</script>

</body>
</html>
